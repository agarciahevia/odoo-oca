# =====================================================================
# Manifiesto git-aggregator — Odoo 18 + OCA (rama 18.0)
#
# Para actualizar el set: añade/quita bloques y vuelve a desplegar.
# Si un repo todavía no tiene rama 18.0, comenta su bloque (el build
# fallaría si la rama no existe).
#
# El ancla &shallow hace clones superficiales (build más rápido/ligero).
# =====================================================================

# ---- Núcleo "enterprise-like" (UI, herramientas de servidor) --------
/opt/oca/web:
  defaults: &shallow
    depth: 1
  remotes:
    oca: https://github.com/OCA/web.git
  merges: [oca 18.0]
  target: oca 18.0

/opt/oca/server-tools:
  defaults: *shallow
  remotes: {oca: https://github.com/OCA/server-tools.git}
