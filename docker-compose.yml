# docker-compose de referencia (local o Dokploy "raw").
# La app instaladora genera una versión equivalente por instalación
# (ver installer-app/app/templates/odoo_compose.yml.j2).
services:
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    image: odoo-oca:18
    depends_on:
      - db
    environment:
      HOST: db
      PORT: "5432"
      USER: odoo
      PASSWORD: ${DB_PASSWORD:-odoo}
      ODOO_MASTER_PASSWORD: ${ODOO_MASTER_PASSWORD:-changeme}
      ODOO_WORKERS: ${ODOO_WORKERS:-2}
    volumes:
      - odoo-data:/var/lib/odoo
      - ./extra-addons:/mnt/extra-addons
    ports:
      - "8069:8069"
      - "8072:8072"   # longpolling / websocket
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-odoo}
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  odoo-data:
  db-data:
