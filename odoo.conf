[options]
; --- IMPORTANTE: addons_path se genera en build (ver Dockerfile) ---
; No añadas aquí 'addons_path' o habrá clave duplicada y Odoo fallará.

; admin_passwd lo inyecta entrypoint.sh desde ODOO_MASTER_PASSWORD
data_dir = /var/lib/odoo
proxy_mode = True
list_db = True
without_demo = all

; Rendimiento (ajustable por servidor vía env / override del conf)
limit_time_cpu = 600
limit_time_real = 1200
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
max_cron_threads = 1
workers = 2
